server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Проксіювання запитів /api/* до backend сервісу
    # backend — ім'я сервісу у compose.yaml (DNS у Docker мережі)
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA routing: будь-який невідомий шлях повертає index.html
    # Це необхідно щоб React Router працював після перезавантаження сторінки
    location / {
        try_files $uri $uri/ /index.html;
    }
}
